name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    env:
      TARGET_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Deploy with server compatibility script over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: TARGET_SHA
          script: |
            set -euo pipefail

            APP_ROOT="/opt/edge-platform"
            APP_USER="edge-platform"

            echo "[deploy-action] ensure repository ownership"
            if ! sudo -n /usr/bin/chown -R "$APP_USER:$APP_USER" "$APP_ROOT"; then
              echo "[deploy-action] warning: unable to repair $APP_ROOT permissions automatically"
            fi

            echo "[deploy-action] fast-forward source to verified revision $TARGET_SHA"
            sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" fetch origin main
            sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" cat-file -e "$TARGET_SHA^{commit}"
            sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" merge-base --is-ancestor "$TARGET_SHA" origin/main
            sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" checkout main
            sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" pull --ff-only origin main

            DEPLOYED_SHA="$(sudo -H -n -u "$APP_USER" git -C "$APP_ROOT" rev-parse HEAD)"
            if [ "$DEPLOYED_SHA" != "$TARGET_SHA" ]; then
              echo "[deploy-action] refusing revision mismatch: expected=$TARGET_SHA actual=$DEPLOYED_SHA" >&2
              exit 1
            fi

            echo "[deploy-action] run server compatibility deploy script"
            test -x "$APP_ROOT/deploy.sh"
            "$APP_ROOT/deploy.sh"
